###############################################
# MediaMTX Configuration for Tapo C320WS
# Converts RTSP stream to HLS for web viewing
###############################################

# Log level (options: debug, info, warn, error)
logLevel: info

# HLS server settings
hlsAddress: :8888
hls: yes
hlsAlwaysRemux: yes
hlsSegmentCount: 3
hlsSegmentDuration: 1s
hlsAllowOrigin: '*'

# RTSP server (receives from camera)
rtspAddress: :8554

# API disabled (not needed)
api: no
apiAddress: :9997

# WebRTC disabled (not needed)
webrtc: no

# Paths - define the camera stream source
paths:
  cam:
    source: rtsp://admin:0j23maqt546@192.168.1.5:554/stream1
    sourceOnDemand: no
